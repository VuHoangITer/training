<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Training Timer</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0a;
        --surface: #111;
        --border: #222;
        --text: #f0f0f0;
        --muted: #555;
        --warmup: #666;
        --shadow: #6366f1;
        --trigger: #3b82f6;
        --trigger-fast: #ef4444;
        --defend: #f97316;
        --freestyle: #a855f7;
        --speed: #06b6d4;
        --footwork: #0ea5e9;
        --core: #84cc16;
        --strength: #22c55e;
        --build: #3b82f6;
        --peak: #ef4444;
        --survive: #f59e0b;
        --aerobic: #22d3ee;
        --ring-size: min(270px, 68vw);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
      }
      .header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        background: var(--bg);
        z-index: 100;
      }
      .header-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 22px;
        letter-spacing: 3px;
      }
      .day-badge {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .btn-calendar {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 12px;
        color: var(--muted);
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.15s;
      }
      .btn-calendar:hover {
        border-color: #444;
        color: var(--text);
      }
      .btn-calendar.today-active {
        border-color: var(--text);
        color: var(--text);
      }

      /* CALENDAR MODAL */
      .cal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 300;
        display: none;
        align-items: flex-start;
        justify-content: center;
        padding-top: 80px;
      }
      .cal-overlay.show {
        display: flex;
      }
      .cal-modal {
        background: #0f0f0f;
        border: 1px solid #2a2a2a;
        border-radius: 16px;
        width: min(360px, calc(100vw - 32px));
        overflow: hidden;
        animation: slideDown 0.2s ease;
      }
      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .cal-header {
        padding: 16px 20px;
        border-bottom: 1px solid #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .cal-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 18px;
        letter-spacing: 2px;
      }
      .cal-nav {
        display: flex;
        gap: 4px;
      }
      .cal-nav-btn {
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 6px;
        padding: 6px 10px;
        color: var(--muted);
        cursor: pointer;
        font-size: 13px;
        transition: all 0.15s;
      }
      .cal-nav-btn:hover {
        color: var(--text);
        border-color: #444;
      }
      .cal-weekdays {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        padding: 12px 16px 4px;
        gap: 2px;
      }
      .cal-wd {
        text-align: center;
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 1px;
        padding: 4px 0;
      }
      .cal-wd.sunday {
        color: #ef4444;
        opacity: 0.6;
      }
      .cal-days {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        padding: 4px 16px 16px;
        gap: 4px;
      }
      .cal-day {
        aspect-ratio: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        font-family: "DM Mono", monospace;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.12s;
        position: relative;
        border: 1px solid transparent;
      }
      .cal-day:hover {
        background: #1a1a1a;
        border-color: #333;
      }
      .cal-day.empty {
        cursor: default;
        pointer-events: none;
      }
      .cal-day.sunday {
        color: #ef4444;
        opacity: 0.5;
      }
      .cal-day.other-month {
        color: #333;
      }
      .cal-day.has-training::after {
        content: "";
        position: absolute;
        bottom: 4px;
        left: 50%;
        transform: translateX(-50%);
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--text);
        opacity: 0.4;
      }
      .cal-day.selected {
        background: var(--text);
        color: var(--bg);
        border-color: var(--text);
        font-weight: 600;
      }
      .cal-day.selected::after {
        background: var(--bg);
        opacity: 0.5;
      }
      .cal-day.is-today {
        border-color: #444;
        color: var(--text);
      }
      .cal-day.is-today:not(.selected) {
        background: #1a1a1a;
      }
      .cal-footer {
        padding: 12px 16px;
        border-top: 1px solid #1a1a1a;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .cal-footer-info {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 1px;
      }
      .btn-today {
        background: transparent;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 6px 12px;
        color: var(--muted);
        font-family: "DM Mono", monospace;
        font-size: 10px;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.15s;
        text-transform: uppercase;
      }
      .btn-today:hover {
        border-color: var(--text);
        color: var(--text);
      }

      /* VIEWING BANNER */
      .viewing-banner {
        display: none;
        background: #161616;
        border-bottom: 1px solid #1e1e1e;
        padding: 8px 20px;
        align-items: center;
        justify-content: space-between;
      }
      .viewing-banner.show {
        display: flex;
      }
      .viewing-info {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .viewing-info span {
        color: var(--text);
      }
      .btn-back-today {
        background: transparent;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 5px 10px;
        color: var(--muted);
        font-family: "DM Mono", monospace;
        font-size: 10px;
        cursor: pointer;
        transition: all 0.15s;
        letter-spacing: 1px;
      }
      .btn-back-today:hover {
        color: var(--text);
        border-color: #555;
      }

      .tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
      }
      .tab {
        flex: 1;
        padding: 14px;
        text-align: center;
        font-family: "DM Mono", monospace;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--muted);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
      }
      .tab.active {
        color: var(--text);
        border-bottom-color: var(--text);
      }
      .content {
        flex: 1;
        padding: 0 0 100px;
      }
      .session {
        display: none;
      }
      .session.active {
        display: block;
      }
      .schedule {
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .phase-label {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        padding: 16px 0 8px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .phase-label::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .phase-label.warmup {
        color: var(--warmup);
      }
      .phase-label.shadow {
        color: var(--shadow);
      }
      .phase-label.trigger {
        color: var(--trigger);
      }
      .phase-label.trigger-fast {
        color: var(--trigger-fast);
      }
      .phase-label.defend {
        color: var(--defend);
      }
      .phase-label.freestyle {
        color: var(--freestyle);
      }
      .phase-label.speed {
        color: var(--speed);
      }
      .phase-label.footwork {
        color: var(--footwork);
      }
      .phase-label.core {
        color: var(--core);
      }
      .phase-label.strength {
        color: var(--strength);
      }
      .phase-label.build {
        color: var(--build);
      }
      .phase-label.peak {
        color: var(--peak);
      }
      .phase-label.survive {
        color: var(--survive);
      }
      .phase-label.aerobic {
        color: var(--aerobic);
      }
      .round-item {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        transition: all 0.15s;
        position: relative;
        overflow: hidden;
      }
      .round-item::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
      }
      .round-item.warmup::before {
        background: var(--warmup);
      }
      .round-item.shadow::before {
        background: var(--shadow);
      }
      .round-item.trigger::before {
        background: var(--trigger);
      }
      .round-item.trigger-fast::before {
        background: var(--trigger-fast);
      }
      .round-item.defend::before {
        background: var(--defend);
      }
      .round-item.freestyle::before {
        background: var(--freestyle);
      }
      .round-item.speed::before {
        background: var(--speed);
      }
      .round-item.footwork::before {
        background: var(--footwork);
      }
      .round-item.core::before {
        background: var(--core);
      }
      .round-item.strength::before {
        background: var(--strength);
      }
      .round-item.build::before {
        background: var(--build);
      }
      .round-item.peak::before {
        background: var(--peak);
      }
      .round-item.survive::before {
        background: var(--survive);
      }
      .round-item.aerobic::before {
        background: var(--aerobic);
      }
      .round-item.current {
        border-color: #333;
        background: #161616;
      }
      .round-item.done {
        opacity: 0.35;
      }
      .round-num {
        font-family: "Bebas Neue", sans-serif;
        font-size: 28px;
        line-height: 1;
        color: var(--muted);
        min-width: 36px;
        text-align: center;
      }
      .round-item.current .round-num {
        color: var(--text);
      }
      .round-info {
        flex: 1;
      }
      .round-name {
        font-weight: 600;
        font-size: 14px;
        margin-bottom: 3px;
      }
      .round-detail {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        color: var(--muted);
      }
      .round-dur {
        font-family: "Bebas Neue", sans-serif;
        font-size: 17px;
        color: var(--muted);
        letter-spacing: 1px;
        text-align: right;
        white-space: nowrap;
      }
      .round-item.current .round-dur {
        color: var(--text);
      }
      .rep-badge {
        background: #1a2a1a;
        color: var(--core);
        border: 1px solid #2a4a2a;
        border-radius: 6px;
        padding: 4px 10px;
        font-family: "DM Mono", monospace;
        font-size: 11px;
        white-space: nowrap;
      }

      /* OVERLAY */
      .timer-overlay {
        position: fixed;
        inset: 0;
        background: var(--bg);
        z-index: 200;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 20px;
      }
      .timer-overlay.show {
        display: flex;
      }
      .t-phase {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--muted);
      }
      .t-name {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(22px, 5.5vw, 36px);
        letter-spacing: 2px;
        text-align: center;
        line-height: 1.15;
        max-width: 320px;
      }
      .t-detail {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        color: var(--muted);
        text-align: center;
        max-width: 300px;
        line-height: 1.6;
      }
      .ring-container {
        position: relative;
        width: var(--ring-size);
        height: var(--ring-size);
      }
      .ring-svg {
        width: 100%;
        height: 100%;
        transform: rotate(-90deg);
      }
      .ring-bg {
        fill: none;
        stroke: var(--border);
        stroke-width: 6;
      }
      .ring-progress {
        fill: none;
        stroke-width: 6;
        stroke-linecap: round;
        transition:
          stroke-dashoffset 0.5s linear,
          stroke 0.3s;
      }
      .ring-center {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }
      .t-sec {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(65px, 17vw, 100px);
        line-height: 1;
        letter-spacing: -2px;
      }
      .t-lbl {
        font-family: "DM Mono", monospace;
        font-size: 12px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--muted);
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
      .ring-container.warn .t-sec {
        animation: pulse 0.5s ease-in-out infinite;
      }
      .rep-display {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }
      .rep-display.show {
        display: flex;
      }
      .rep-num {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(58px, 15vw, 88px);
        line-height: 1;
        color: var(--core);
      }
      .rep-lbl {
        font-family: "DM Mono", monospace;
        font-size: 12px;
        letter-spacing: 3px;
        color: var(--muted);
        text-transform: uppercase;
      }
      .btn-done {
        background: var(--core);
        color: #000;
        padding: 16px 48px;
        border-radius: 12px;
        font-family: "Bebas Neue", sans-serif;
        font-size: 20px;
        letter-spacing: 3px;
        border: none;
        cursor: pointer;
      }
      .btn-done:active {
        transform: scale(0.96);
      }
      .next-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 18px;
        text-align: center;
        width: calc(100% - 40px);
        max-width: 320px;
      }
      .next-lbl {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        letter-spacing: 3px;
        color: var(--muted);
        margin-bottom: 3px;
        text-transform: uppercase;
      }
      .next-name {
        font-size: 13px;
        font-weight: 600;
      }
      .next-name.warn-txt {
        color: var(--survive);
        animation: pulse 0.5s ease-in-out infinite;
      }
      .next-detail {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--muted);
        margin-top: 4px;
        line-height: 1.4;
      }
      .t-controls {
        display: flex;
        gap: 12px;
      }
      .btn {
        border: none;
        border-radius: 10px;
        font-family: "DM Mono", monospace;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-prim {
        background: var(--text);
        color: var(--bg);
        padding: 15px 36px;
        font-size: 13px;
      }
      .btn-sec {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 15px 22px;
      }
      .btn-close {
        position: absolute;
        top: 18px;
        right: 18px;
        background: var(--surface);
        color: var(--muted);
        border: 1px solid var(--border);
        padding: 9px 14px;
        font-size: 11px;
        letter-spacing: 1px;
      }
      .sticky-start {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 28px 20px 16px;
        background: linear-gradient(transparent, var(--bg) 30%);
        z-index: 50;
      }
      .est-time {
        text-align: center;
        font-family: "DM Mono", monospace;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 2px;
        margin-bottom: 8px;
      }
      .est-time span {
        color: var(--text);
      }
      .est-time-bar {
        text-align: center;
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 2px;
        padding: 8px 20px;
        border-bottom: 1px solid var(--border);
        min-height: 33px;
      }
      .est-time-bar span {
        color: var(--text);
      }
      .btn-start {
        width: 100%;
        background: var(--text);
        color: var(--bg);
        padding: 17px;
        border-radius: 12px;
        font-family: "Bebas Neue", sans-serif;
        font-size: 19px;
        letter-spacing: 4px;
        cursor: pointer;
        border: none;
      }
      .progress-bar {
        height: 2px;
        background: var(--border);
      }
      .progress-fill {
        height: 100%;
        background: var(--text);
        transition: width 0.3s;
      }
      .done-screen {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 40px 20px;
        text-align: center;
        min-height: 60vh;
      }
      .done-screen.show {
        display: flex;
      }
      .done-icon {
        font-size: 60px;
        animation: bounce 0.6s ease;
      }
      @keyframes bounce {
        0% {
          transform: scale(0);
        }
        60% {
          transform: scale(1.2);
        }
        100% {
          transform: scale(1);
        }
      }
      .done-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 46px;
        letter-spacing: 4px;
      }
      .done-sub {
        color: var(--muted);
        font-family: "DM Mono", monospace;
        font-size: 12px;
        letter-spacing: 2px;
      }
      .no-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 60px 20px;
        text-align: center;
        color: var(--muted);
      }
      .no-content-icon {
        font-size: 48px;
        opacity: 0.3;
      }
      .no-content-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 26px;
        letter-spacing: 2px;
        color: #333;
      }
      .no-content-sub {
        font-family: "DM Mono", monospace;
        font-size: 11px;
      }

      /* preview mode */
      body.preview-mode .sticky-start {
        display: none !important;
      }
      .preview-note {
        display: none;
        background: #1a1500;
        border: 1px solid #3a3000;
        border-radius: 8px;
        margin: 16px 20px 0;
        padding: 10px 14px;
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: #f59e0b;
        letter-spacing: 1px;
        text-align: center;
      }
      body.preview-mode .preview-note {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div>
        <div class="header-title">TRAINING</div>
        <div class="day-badge" id="dayBadge">loading...</div>
      </div>
      <div class="header-right">
        <div class="day-badge" id="dateBadge"></div>
        <button class="btn-calendar" id="btnCalendar" onclick="openCalendar()">
          📅
        </button>
      </div>
    </div>

    <!-- CALENDAR MODAL -->
    <div
      class="cal-overlay"
      id="calOverlay"
      onclick="handleOverlayClick(event)"
    >
      <div class="cal-modal" id="calModal">
        <div class="cal-header">
          <div class="cal-title" id="calMonthTitle">THÁNG 5 2026</div>
          <div class="cal-nav">
            <button class="cal-nav-btn" onclick="calPrev()">◀</button>
            <button class="cal-nav-btn" onclick="calNext()">▶</button>
          </div>
        </div>
        <div class="cal-weekdays">
          <div class="cal-wd sunday">CN</div>
          <div class="cal-wd">T2</div>
          <div class="cal-wd">T3</div>
          <div class="cal-wd">T4</div>
          <div class="cal-wd">T5</div>
          <div class="cal-wd">T6</div>
          <div class="cal-wd">T7</div>
        </div>
        <div class="cal-days" id="calDays"></div>
        <div class="cal-footer">

    <script>
      // ══════════════════════════════════
      // PHASE META
      // ══════════════════════════════════
      const PH_COLOR = {
        warmup: "#666",

        "trigger-fast": "TRIGGER ⭐",
        defend: "DEFEND",
        freestyle: "FREESTYLE",
        speed: "SPEED",
        footwork: "FOOTWORK",
        core: "CORE",
        strength: "STRENGTH",

      // ══════════════════════════════════
      // DATE STATE
      // ══════════════════════════════════
      const DAYS_VI = [
        "Chủ nhật",
        "Thứ 2",
        "Thứ 3",
        "Thứ 4",
        "Thứ 5",
        "Thứ 6",

      ];
      const MONTHS_VI = [
        "Tháng 1",

        "Tháng 4",
        "Tháng 5",
        "Tháng 6",
        "Tháng 7",
        "Tháng 8",
        "Tháng 9",
        "Tháng 10",
        "Tháng 11",
        "Tháng 12",
      ];

      const realNow = new Date(
        new Date().toLocaleString("en-US", { timeZone: "Asia/Ho_Chi_Minh" }),
      );
      const TODAY_Y = realNow.getFullYear();
      const TODAY_M = realNow.getMonth();
      const TODAY_D = realNow.getDate();

      let viewDate = new Date(TODAY_Y, TODAY_M, TODAY_D);
      let calYear = TODAY_Y,
        calMonth = TODAY_M;

      function isToday(d) {
        return (
          d.getFullYear() === TODAY_Y &&
          d.getMonth() === TODAY_M &&
          d.getDate() === TODAY_D
        );
      }
      function isViewDate(d) {
        return (
          d.getFullYear() === viewDate.getFullYear() &&
          d.getMonth() === viewDate.getMonth() &&
          d.getDate() === viewDate.getDate()
        );
      }
      function isPreviewMode() {
        return !isToday(viewDate);
      }

      // ══════════════════════════════════
      // WEEK CALC
      // ══════════════════════════════════
      function weekNumFrom(startDateStr, refDate) {
        const s = new Date(startDateStr);
        s.setHours(0, 0, 0, 0);
        const t = new Date(refDate);
        t.setHours(0, 0, 0, 0);
        const diff = t - s;
        if (diff < 0) return 0;
        return Math.max(1, Math.floor(diff / (7 * 24 * 60 * 60 * 1000)) + 1);
      }

      function getWkBoxing() {
        return weekNumFrom("2026-04-20", viewDate);
      }
      function getWkStrength() {
        return weekNumFrom("2026-04-13", viewDate);
      }
      function getWkCardio() {
        return weekNumFrom("2026-05-04", viewDate);
      }

      function getBoxingPhase() {
        const w = getWkBoxing();
        if (w <= 2)
          return { rounds: 4, roundMin: 2, restSec: 60, deload: false };
        if (w <= 4)
          return { rounds: 5, roundMin: 2, restSec: 45, deload: false };
        if (w <= 6)
          return { rounds: 6, roundMin: 3, restSec: 45, deload: false };
        if (w === 7)
          return { rounds: 3, roundMin: 2, restSec: 60, deload: true };
        if (w <= 10)
          return { rounds: 6, roundMin: 3, restSec: 45, deload: false };
        return { rounds: 5, roundMin: 3, restSec: 45, deload: false };
      }
      function getStrengthPhase() {
        const w = getWkStrength();
        if (w <= 2)
          return {
            sets: 3,
            pushRep: "6-8",
            rowRep: "8-10",
            chinup: false,
            restSec: 90,
            explosive: false,
          };
        if (w <= 4)
          return {
            sets: 3,
            pushRep: "8-10",
            rowRep: "10-12",
            chinup: true,
            chinupRep: "3",
            restSec: 75,
            explosive: false,
          };
        if (w <= 6)
          return {
            sets: 4,
            pushRep: "8-12",
            rowRep: "10-12",
            chinup: true,
            chinupRep: "4-5",
            restSec: 60,
            explosive: true,
          };
        if (w === 7)
          return {
            sets: 2,
            pushRep: "6-8",
            rowRep: "8-10",
            chinup: false,
            restSec: 90,
            explosive: false,
          };
        if (w <= 10)
          return {
            sets: 4,
            pushRep: "10-12",
            rowRep: "12",
            chinup: true,
            chinupRep: "5-6",
            restSec: 60,
            explosive: true,
          };
        return {
          sets: 4,
          pushRep: "10-12",
          rowRep: "12",
          chinup: true,
          chinupRep: "5-6",
          restSec: 60,
          explosive: true,
        };
      }
      function getCardioPhase() {
        const w = getWkCardio();
        if (w <= 0) return null;
        if (w <= 2)
          return { t3Rounds: 4, t3Min: 2, t3Rest: 90, hiitOn: 30, hiitOff: 30 };
        if (w <= 4)
          return { t3Rounds: 4, t3Min: 3, t3Rest: 75, hiitOn: 40, hiitOff: 20 };
        if (w <= 6)
          return { t3Rounds: 4, t3Min: 3, t3Rest: 60, hiitOn: 45, hiitOff: 15 };
        if (w === 7)
          return {
            t3Rounds: 3,
            t3Min: 2,
            t3Rest: 90,
            hiitOn: 30,
            hiitOff: 30,
            deload: true,
          };
        if (w <= 10)
          return { t3Rounds: 5, t3Min: 3, t3Rest: 60, hiitOn: 40, hiitOff: 20 };
        return { t3Rounds: 5, t3Min: 3, t3Rest: 60, hiitOn: 40, hiitOff: 20 };
      }

      // ══════════════════════════════════
      // BUILDERS
      // ══════════════════════════════════
      const isRep = (item) => !!item.reps;
      const W3 = () => [
        {
          phase: "warmup",
          name: "Khởi động",
          detail: "Nhảy/bước chân nhẹ 2p",
          onSec: 120,
          offSec: 0,
        },
        {
          phase: "warmup",
          name: "Khởi động",
          detail: "Xoay khớp vai, hông, gối",
          onSec: 60,
          offSec: 0,
        },
        {
          phase: "warmup",
          name: "Khởi động",
          detail: "Shadow rất nhẹ 1p",
          onSec: 60,
          offSec: 0,
        },
      ];
      const SH2 = () => [
        {
          phase: "shadow",
          name: "Shadow H1",
          detail: "Di chuyển nhẹ, không đánh nặng",
          onSec: 120,
          offSec: 0,
        },
        {
          phase: "shadow",
          name: "Shadow H2",
          detail: "Di chuyển nhẹ, không đánh nặng",
          onSec: 120,
          offSec: 0,
        },
      ];
      const SH3 = (cue, bp) => {
        const rest = bp.restSec;
        return [
          {
            phase: "shadow",
            name: "Shadow H1",
            detail: cue,
            onSec: bp.roundMin * 60,
            offSec: rest,
          },
          {
            phase: "shadow",
            name: "Shadow H2",
            detail: "Cue xuất hiện → action ngay, không nghĩ",
            onSec: bp.roundMin * 60,
            offSec: rest,
          },
          {
            phase: "shadow",
            name: "Shadow H3",
            detail: "70-80% tốc độ",
            onSec: bp.roundMin * 60,
            offSec: rest,
          },
        ];
      };
      function TRIG(bp, d1, d2, d3) {
        const t = bp.roundMin * 60,
          r = bp.restSec,
          total = bp.rounds;
        const items = [
          {
            phase: "trigger",
            name: "Trigger H1",
            detail: d1,
            onSec: t,
            offSec: r,
          },
          {
            phase: "trigger",
            name: "Trigger H2",
            detail: d2 || d1,
            onSec: t,
            offSec: r,
          },
          {
            phase: "trigger-fast",
            name: "Trigger H3 ⭐",
            detail: d3,
            onSec: t,
            offSec: r,
          },
          {
            phase: "trigger-fast",
            name: "Trigger H4 FREESTYLE ⭐",
            detail: "Mắt đọc → tay tự chạy → lui ngay",
            onSec: t,
            offSec: r,
          },
        ];
        for (let i = 5; i <= total; i++) {
          items.push({
            phase: "trigger-fast",
            name: `Trigger H${i} ⭐`,
            detail: "Mắt đọc → tay tự chạy → lui ngay",
            onSec: t,
            offSec: r,
          });
        }
        return items;
      }
      const DEF = () => [
        {
          phase: "defend",
          name: "Defend H1",
          detail:
            "Slip — vai giật→slip | Duck — khuỷu vòng→duck | Pull back — người lao→pull back",
          onSec: 120,
          offSec: 40,
        },
        {
          phase: "defend",
          name: "Defend H2",
          detail: "Tự do — slip/duck/pull tùy cue",
          onSec: 120,
          offSec: 40,
        },
      ];
      const FREE = (bp) => [
        {
          phase: "freestyle",
          name: "Freestyle H1",
          detail: "Mắt đọc → tay tự chạy. Không nghĩ trước",
          onSec: bp.roundMin * 60,
          offSec: bp.restSec,
        },
        {
          phase: "freestyle",
          name: "Freestyle H2",
          detail: "Thấy cue → phản xạ ngay. Xong → lui",

      const CORE = () => [
        {
          phase: "core",
          name: "Leg Raises SET 1",
          detail: "Hạ chân chậm, không thả rơi",

        },
        {

      function buildMonday_M() {
        const bp = getBoxingPhase();
        return [

            "Chậm — bắt đúng cue, không vội",
            "Tăng tốc — cue xuất hiện → vào thẳng ngay",
          ),
          ...DEF(),
          ...FREE(bp),
        ];
      }

      // ✅ buildTuesday_M theo tuần — 5 đòn thủ: Slip, Duck, Pull back, Block, Deflect
      function buildTuesday_M() {
        const bp = getBoxingPhase();
        const w = getWkBoxing();

        } else if (w <= 4) {

          return [

              onSec: 120,

              onSec: 120,

        } else if (w <= 4) {

      // ══════════════════════════════════
      // CALENDAR
      // ══════════════════════════════════
      function openCalendar() {
        calYear = viewDate.getFullYear();
        calMonth = viewDate.getMonth();
        renderCalendar();
        document.getElementById("calOverlay").classList.add("show");
      }
      function closeCalendar() {
        document.getElementById("calOverlay").classList.remove("show");
      }
      function handleOverlayClick(e) {
        if (e.target === document.getElementById("calOverlay")) closeCalendar();
      }
      function calPrev() {
        calMonth--;
        if (calMonth < 0) {
          calMonth = 11;
          calYear--;
        }
        renderCalendar();
      }
      function calNext() {
        calMonth++;
        if (calMonth > 11) {
          calMonth = 0;
          calYear++;
        }
        renderCalendar();
      }

      function renderCalendar() {
        document.getElementById("calMonthTitle").textContent =
          `${MONTHS_VI[calMonth].toUpperCase()} ${calYear}`;
        const firstDay = new Date(calYear, calMonth, 1).getDay();
        const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
        const daysInPrev = new Date(calYear, calMonth, 0).getDate();
        let html = "";
        for (let i = firstDay - 1; i >= 0; i--)
          html += `<div class="cal-day other-month">${daysInPrev - i}</div>`;
        for (let d = 1; d <= daysInMonth; d++) {
          const date = new Date(calYear, calMonth, d);
          const dow = date.getDay();
          const isSun = dow === 0;
          const isTod =
            date.getFullYear() === TODAY_Y &&
            date.getMonth() === TODAY_M &&
            date.getDate() === TODAY_D;
          const isSel = isViewDate(date);
          const hasTrain = !isSun;
          let cls = "cal-day";
          if (isSun) cls += " sunday";
          if (isTod) cls += " is-today";
          if (isSel) cls += " selected";
          if (hasTrain) cls += " has-training";
          html += `<div class="${cls}" onclick="selectDate(${calYear},${calMonth},${d})">${d}</div>`;
        }
        const total = firstDay + daysInMonth;
        const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
        for (let d = 1; d <= remaining; d++)
          html += `<div class="cal-day other-month">${d}</div>`;
        document.getElementById("calDays").innerHTML = html;
        const selDow = viewDate.getDay();
        const selStr = `${DAYS_VI[selDow].toUpperCase()} ${viewDate.getDate().toString().padStart(2, "0")}/${(viewDate.getMonth() + 1).toString().padStart(2, "0")}/${viewDate.getFullYear()}`;
        document.getElementById("calFooterInfo").textContent =
          `ĐÃ CHỌN: ${selStr}`;
      }
      function selectDate(y, m, d) {
        viewDate = new Date(y, m, d);
        closeCalendar();
        loadViewDate();
      }
      function goToday() {
        viewDate = new Date(TODAY_Y, TODAY_M, TODAY_D);
        closeCalendar();
        loadViewDate();
      }

      // ══════════════════════════════════
      // LOAD VIEW DATE
      // ══════════════════════════════════
      function loadViewDate() {
        const dayIdx = viewDate.getDay();
        const dayEnView = DAYS_EN[dayIdx];
        const preview = isPreviewMode();
        document.getElementById("dayBadge").textContent =
          DAYS_VI[dayIdx].toUpperCase();
        document.getElementById("dateBadge").textContent =
          viewDate.toLocaleDateString("vi-VN");
        const banner = document.getElementById("viewingBanner");
        if (preview) {
          document.getElementById("viewingDate").textContent =
            `${DAYS_VI[dayIdx]} ${viewDate.getDate().toString().padStart(2, "0")}/${(viewDate.getMonth() + 1).toString().padStart(2, "0")}/${viewDate.getFullYear()}`;
          banner.classList.add("show");
        } else {
          banner.classList.remove("show");
        }
        document.body.classList.toggle("preview-mode", preview);
        document
          .getElementById("btnCalendar")
          .classList.toggle("today-active", !preview);
        ["morning", "afternoon"].forEach((s) => {
          document.getElementById(`done-${s}`).classList.remove("show");
          document.getElementById(`schedule-${s}`).style.display = "";
        });
        if (ts.iv) {
          clearInterval(ts.iv);
          ts.iv = null;
        }
        document.getElementById("timerOverlay").classList.remove("show");
        document.getElementById("progressFill").style.width = "0%";
        if (dayEnView === "Sunday") {
          ["morning", "afternoon"].forEach((s) => {
            document.getElementById(`schedule-${s}`).innerHTML =
              '<div class="no-content"><div class="no-content-icon">😴</div><div class="no-content-title">CHỦ NHẬT</div><div class="no-content-sub">nghỉ ngơi hoàn toàn 🛌</div></div>';
          });
          document.getElementById("stickyStart").style.display = "none";
          sessData = { morning: [], afternoon: [] };
          return;
        }
        const data = buildScheduleFromDay(dayEnView);
        sessData = data;
        renderSchedule(data.morning, "schedule-morning");
        renderSchedule(data.afternoon, "schedule-afternoon");
        if (!preview)
          document.getElementById("stickyStart").style.display = "block";
        switchTab("morning");
        updateEstTime();
      }

      // ══════════════════════════════════
      // RENDER
      // ══════════════════════════════════
      function fmtDur(item) {
        if (item.reps) {
          return item.restSec && item.restSec > 0
            ? item.reps + " REP + " + item.restSec + "s"
            : item.reps + " REP";
        }
        if (item.offSec > 0) return item.onSec + "s+" + item.offSec + "s";
        const s = item.onSec;
        return s >= 60
          ? Math.floor(s / 60) + "m" + (s % 60 > 0 ? (s % 60) + "s" : "")
          : s + "s";
      }
      function calcEstTime(items) {
        if (!items || !items.length) return null;
        let total = 0;
        items.forEach((item) => {
          if (!isRep(item)) total += (item.onSec || 0) + (item.offSec || 0);
        });
        if (total === 0) return null;
        const m = Math.floor(total / 60),
          s = total % 60;
        return m > 0 ? (s > 0 ? `~${m} phút ${s}s` : `~${m} phút`) : `~${s}s`;
      }
      function updateEstTime() {
        const el = document.getElementById("estTimebar");
        if (!el) return;
        const est = calcEstTime(sessData[curSess]);
        el.innerHTML = est ? `⏱ ước tính timer: <span>${est}</span>` : "";
      }
      function renderSchedule(items, cid) {
        const el = document.getElementById(cid);
        if (!items || !items.length) {
          el.innerHTML =
            '<div class="no-content"><div class="no-content-icon">📭</div><div class="no-content-title">KHÔNG CÓ LỊCH</div><div class="no-content-sub">hôm nay nghỉ 🛌</div></div>';
          return;
        }
        let html = "",
          lastPh = "";
        items.forEach((item, i) => {
          const ph = item.phase;
          if (ph !== lastPh) {
            html += `<div class="phase-label ${ph}">${PH_LABEL[ph] || ph}</div>`;
            lastPh = ph;
          }
          const durHtml = item.reps
            ? `<div class="rep-badge">${item.reps} REP</div>`
            : `<div class="round-dur">${fmtDur(item)}</div>`;
          html += `<div class="round-item ${ph}" id="item-${cid}-${i}" onclick="jumpToRound(${i},'${cid}')">
            <div class="round-num">${i + 1}</div>
            <div class="round-info"><div class="round-name">${item.name}</div><div class="round-detail">${item.detail}</div></div>
            ${durHtml}</div>`;
        });
        el.innerHTML = html;
      }

      // ══════════════════════════════════
      // TIMER ENGINE
      // ══════════════════════════════════
      let curSess = "morning",
        sessData = { morning: [], afternoon: [] };
      let ts = {
        items: [],
        idx: 0,
        isOn: true,
        rem: 0,
        paused: false,
        iv: null,
        isResting: false,
        restRem: 0,
      };
      const CIRC = 2 * Math.PI * 44;
      const synth = window.speechSynthesis;
      let lastSpoken = -1;

      function showRing(show) {
        document.getElementById("timerMode").style.display = show
          ? "block"
          : "none";
        document.getElementById("repMode").classList.toggle("show", !show);
        document.getElementById("tControls").style.display = show
          ? "flex"
          : "none";
      }
      function speak(txt) {
        if (!synth) return;
        synth.cancel();
        const u = new SpeechSynthesisUtterance(txt);
        u.lang = "vi-VN";
        u.rate = 1.1;
        synth.speak(u);
      }
      function updateRing(prog, ph) {
        const r = document.getElementById("ringProgress");
        r.style.strokeDashoffset = CIRC * (1 - prog);
        r.style.stroke = PH_COLOR[ph] || "#f0f0f0";
      }
      function updateUI() {
        const item = ts.items[ts.idx];
        if (!item) return;
        if (ts.isResting) {
          showRing(true);
          document.getElementById("tPhase").textContent =
            PH_LABEL[item.phase] || item.phase;
          document.getElementById("tName").textContent = "NGHỈ";
          document.getElementById("tDetail").textContent =
            "Thở đều, chuẩn bị set tiếp theo";
          const total = item.restSec,
            rem = ts.restRem;
          const prog = total > 0 ? rem / total : 0;
          const warn = rem <= 10 && rem > 0;
          document.getElementById("tSec").textContent = rem;
          document.getElementById("tLbl").textContent = "NGHỈ";
          document.getElementById("tSec").style.color = "var(--muted)";
          updateRing(prog, "warmup");
          document
            .getElementById("ringContainer")
            .classList.toggle("warn", warn);
          const ni = document.getElementById("nextName");
          const nd = document.getElementById("nextDetail");
          const nx = ts.idx + 1;
          ni.textContent =
            nx < ts.items.length ? ts.items[nx].name : "🏁 KẾT THÚC";
          nd.textContent =
            nx < ts.items.length ? ts.items[nx].detail || "" : "";
          ni.className = "next-name";
          document
            .querySelectorAll(`#schedule-${curSess} .round-item`)
            .forEach((el, i) => {
              el.classList.toggle("current", i === ts.idx);
              el.classList.toggle("done", i < ts.idx);
            });
          document.getElementById("progressFill").style.width =
            (ts.idx / ts.items.length) * 100 + "%";
          return;
        }
        document.getElementById("tPhase").textContent =
          PH_LABEL[item.phase] || item.phase;
        document.getElementById("tName").textContent = item.name;
        document.getElementById("tDetail").textContent = item.detail;
        if (isRep(item)) {
          showRing(false);
          document.getElementById("repNum").textContent = item.reps;
        } else {
          showRing(true);
          const { isOn, rem } = ts,
            total = isOn ? item.onSec : item.offSec,
            prog = total > 0 ? rem / total : 0,
            warn = rem <= 10 && rem > 0;
          document.getElementById("tSec").textContent = rem;
          document.getElementById("tLbl").textContent = isOn ? "ON" : "NGHỈ";
          document.getElementById("tSec").style.color = warn
            ? "var(--survive)"
            : !isOn
              ? "var(--muted)"
              : "var(--text)";
          updateRing(prog, isOn ? item.phase : "warmup");
          document
            .getElementById("ringContainer")
            .classList.toggle("warn", warn);
          const ni = document.getElementById("nextName");
          let nxt,
            nxtWarn = false;
          if (isOn && item.offSec > 0) {
            nxt = `NGHỈ ${item.offSec}s`;
          } else {
            const nx = ts.idx + 1;
            nxt = nx < ts.items.length ? ts.items[nx].name : "🏁 KẾT THÚC";
            if (warn) nxtWarn = true;
          }
          ni.textContent = nxt;
          ni.className = "next-name" + (nxtWarn ? " warn-txt" : "");
          const nd2 = document.getElementById("nextDetail");
          if (isOn && item.offSec > 0) {
            nd2.textContent = "";
          } else {
            const nx2 = ts.idx + 1;
            nd2.textContent =
              nx2 < ts.items.length ? ts.items[nx2].detail || "" : "";
          }
        }
        document
          .querySelectorAll(`#schedule-${curSess} .round-item`)
          .forEach((el, i) => {
            el.classList.toggle("current", i === ts.idx);
            el.classList.toggle("done", i < ts.idx);
          });
        document.getElementById("progressFill").style.width =
          (ts.idx / ts.items.length) * 100 + "%";
      }
      function tick() {
        if (ts.paused) return;
        if (ts.isResting) {
          ts.restRem--;
          if (ts.restRem <= 10 && ts.restRem !== lastSpoken && ts.restRem > 0) {
            lastSpoken = ts.restRem;
            speak(String(ts.restRem));
          }
          if (ts.restRem <= 0) {
            ts.isResting = false;
            advance();
            return;
          }
          updateUI();
          return;
        }
        const item = ts.items[ts.idx];
        if (!item || isRep(item)) return;
        ts.rem--;
        if (ts.rem <= 0) {
          playBeep(ts.isOn ? "end" : "start");
          if (ts.isOn && item.offSec > 0) {
            ts.isOn = false;
            ts.rem = item.offSec;
            lastSpoken = -1;
            speak("Nghỉ " + item.offSec + " giây");
          } else {
            advance();
            return;
          }
        }
        if (ts.rem <= 10 && ts.rem !== lastSpoken && ts.rem > 0) {
          lastSpoken = ts.rem;
          speak(String(ts.rem));
        }
        if (ts.rem === 10 && ts.isOn) playBeep("warning");
        updateUI();
      }
      function advance() {
        ts.idx++;
        if (ts.idx >= ts.items.length) {
          finishSession();
          return;
        }
        ts.isOn = true;
        ts.isResting = false;
        ts.restRem = 0;
        lastSpoken = -1;
        const it = ts.items[ts.idx];
        ts.rem = isRep(it) ? 0 : it.onSec;
        speak(
          isRep(it)
            ? it.name + " — " + it.reps + " rep"
            : it.detail
              ? it.name + ". " + it.detail
              : it.name,
        );
        startIv();
        updateUI();
      }
      function repDone() {
        playBeep("end");
        const item = ts.items[ts.idx];
        if (item && item.restSec && item.restSec > 0) {
          ts.isResting = true;
          ts.restRem = item.restSec;
          lastSpoken = -1;
          speak("Nghỉ " + item.restSec + " giây");
          startIv();
          updateUI();
        } else {
          advance();
        }
      }
      function startIv() {
        if (ts.iv) {
          clearInterval(ts.iv);
          ts.iv = null;
        }
        const item = ts.items[ts.idx];
        if (ts.isResting || (item && !isRep(item)))
          ts.iv = setInterval(tick, 1000);
      }
      function playBeep(type) {
        try {
          const C = new (window.AudioContext || window.webkitAudioContext)(),
            o = C.createOscillator(),
            g = C.createGain();
          o.connect(g);
          g.connect(C.destination);
          if (type === "warning") {
            o.frequency.value = 880;
            g.gain.setValueAtTime(0.3, C.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, C.currentTime + 0.15);
            o.start();
            o.stop(C.currentTime + 0.15);
          } else if (type === "end") {
            o.frequency.value = 660;
            g.gain.setValueAtTime(0.5, C.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, C.currentTime + 0.2);
            o.start();
            o.stop(C.currentTime + 0.2);
            setTimeout(() => {
              const C2 = new (
                  window.AudioContext || window.webkitAudioContext
                )(),
                o2 = C2.createOscillator(),
                g2 = C2.createGain();
              o2.connect(g2);
              g2.connect(C2.destination);
              o2.frequency.value = 880;
              g2.gain.setValueAtTime(0.5, C2.currentTime);
              g2.gain.exponentialRampToValueAtTime(0.01, C2.currentTime + 0.3);
              o2.start();
              o2.stop(C2.currentTime + 0.3);
            }, 250);
          } else {
            o.frequency.value = 440;
            g.gain.setValueAtTime(0.4, C.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, C.currentTime + 0.3);
            o.start();
            o.stop(C.currentTime + 0.3);
          }
        } catch (e) {}
      }
      function startSession() {
        if (isPreviewMode()) return;
        const items = sessData[curSess];
        if (!items || !items.length) return;
        ts = {
          items,
          idx: 0,
          isOn: true,
          rem: isRep(items[0]) ? 0 : items[0].onSec,
          paused: false,
          iv: null,
          isResting: false,
          restRem: 0,
        };
        lastSpoken = -1;
        document.getElementById("timerOverlay").classList.add("show");
        document.getElementById("btnPR").textContent = "PAUSE";
        speak(
          items[0].detail
            ? items[0].name + ". " + items[0].detail
            : items[0].name,
        );
        startIv();
        updateUI();
      }
      function jumpToRound(idx, sid) {
        if (sid !== curSess) return;
        if (isPreviewMode()) return;
        const items = sessData[curSess];
        if (!items || idx >= items.length) return;
        if (ts.iv) {
          clearInterval(ts.iv);
          ts.iv = null;
        }
        ts = {
          items,
          idx,
          isOn: true,
          rem: isRep(items[idx]) ? 0 : items[idx].onSec,
          paused: false,
          iv: null,
          isResting: false,
          restRem: 0,
        };
        lastSpoken = -1;
        document.getElementById("timerOverlay").classList.add("show");
        document.getElementById("btnPR").textContent = "PAUSE";
        speak(
          items[idx].detail
            ? items[idx].name + ". " + items[idx].detail
            : items[idx].name,
        );
        startIv();
        updateUI();
      }
      function togglePause() {
        ts.paused = !ts.paused;
        document.getElementById("btnPR").textContent = ts.paused
          ? "TIẾP"
          : "PAUSE";
        if (!ts.paused) startIv();
      }
      function skipRound() {
        if (ts.iv) {
          clearInterval(ts.iv);
          ts.iv = null;
        }
        ts.isResting = false;
        ts.restRem = 0;
        advance();
      }
      function closeTimer() {
        if (ts.iv) {
          clearInterval(ts.iv);
          ts.iv = null;
        }
        synth && synth.cancel();
        document.getElementById("timerOverlay").classList.remove("show");
      }
      function finishSession() {
        if (ts.iv) {
          clearInterval(ts.iv);
          ts.iv = null;
        }
        synth && synth.cancel();
        document.getElementById("timerOverlay").classList.remove("show");
        document.getElementById(`schedule-${curSess}`).style.display = "none";
        document.getElementById(`done-${curSess}`).classList.add("show");
        document.getElementById("stickyStart").style.display = "none";
        document.getElementById("progressFill").style.width = "100%";
        playBeep("end");
        setTimeout(() => playBeep("end"), 600);
        speak("Hoàn thành! Tuyệt vời!");
      }
      function switchTab(s) {
        curSess = s;
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document.getElementById(`tab-${s}`).classList.add("active");
        document
          .querySelectorAll(".session")
          .forEach((el) => el.classList.remove("active"));
        document.getElementById(`session-${s}`).classList.add("active");
        if (!isPreviewMode()) {
          document.getElementById("stickyStart").style.display = document
            .getElementById(`done-${s}`)
            .classList.contains("show")
            ? "none"
            : "block";
        }
        updateEstTime();
      }

      // ── INIT ──
      loadViewDate();
    </script>
  </body>
</html>
